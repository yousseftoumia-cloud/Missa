<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Katkouta ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffc3d1);
    position:relative;
}

/* Floating Hearts */

.heart-bg{
    position:absolute;
    color:white;
    opacity:0.4;
    animation:floatUp linear infinite;
    user-select:none;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
        opacity:0;
    }

    20%{
        opacity:0.5;
    }

    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

/* Main Card */

.container{
    width:90%;
    max-width:650px;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:40px;
    text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,.15);
    z-index:10;
}

h1{
    color:white;
    font-size:2.5rem;
    margin-bottom:20px;
}

.subtitle{
    color:white;
    font-size:1.2rem;
    margin-bottom:30px;
}

/* Buttons Area */

.buttons{
    position:relative;
    height:250px;
    width:100%;
}

/* YES */

#yes{
    background:#ff2d75;
    color:white;
    border:none;
    border-radius:50px;
    padding:15px 35px;
    font-size:1.2rem;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 5px 20px rgba(255,45,117,.5);
}

/* NO */

#no{
    position:absolute;
    left:65%;
    top:0;
    background:white;
    color:#ff2d75;
    border:none;
    border-radius:50px;
    padding:15px 35px;
    font-size:1.1rem;
    cursor:pointer;
    transition:.2s;
}

.result{
    display:none;
}

.result h1{
    font-size:3rem;
}

.result p{
    color:white;
    font-size:1.4rem;
    margin-top:20px;
}

/* Explosion Hearts */

.explosion{
    position:absolute;
    font-size:30px;
    animation:explode 3s forwards;
    pointer-events:none;
}

@keyframes explode{
    from{
        opacity:1;
        transform:translate(0,0) scale(1);
    }

    to{
        opacity:0;
        transform:
        translate(
        calc((var(--x) - 0.5) * 700px),
        calc((var(--y) - 0.5) * 700px)
        )
        scale(0);
    }
}

</style>
</head>

<body>

<div id="questionBox" class="container">

    <h1>❤️ Hey Katkouta ❤️</h1>

    <p class="subtitle">
        Will you be mine forever? 🥺💕
    </p>

    <div class="buttons">

        <button id="yes">
            YES 💖
        </button>

        <button id="no">
            NO 🙈
        </button>

    </div>

</div>

<div id="resultBox" class="container result">

    <h1>🥰 I was sure Katkouta ❤️</h1>

    <p>
        You just made me the happiest man alive 💕✨
    </p>

</div>

<script>

/* Floating Hearts Background */

for(let i=0;i<30;i++){

    let heart=document.createElement("div");

    heart.className="heart-bg";

    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=
    (Math.random()*25+15)+"px";

    heart.style.animationDuration=
    (Math.random()*8+6)+"s";

    heart.style.animationDelay=
    Math.random()*5+"s";

    document.body.appendChild(heart);
}

/* Buttons Logic */

const yesBtn=document.getElementById("yes");
const noBtn=document.getElementById("no");

let scale=1;

const messages=[
"NO 🙈",
"Are you sure? 🥺",
"Really? 😭",
"Think again 💔",
"Please? 🥹",
"Come on Katkouta ❤️",
"You know the answer 😘",
"Stop running 😭",
"Click YES 😍"
];

let attempt=0;

function escapeNo(){

    const container=
    document.querySelector(".buttons");

    const maxX=
    container.clientWidth-noBtn.offsetWidth;

    const maxY=
    container.clientHeight-noBtn.offsetHeight;

    const randomX=Math.random()*maxX;
    const randomY=Math.random()*maxY;

    noBtn.style.left=randomX+"px";
    noBtn.style.top=randomY+"px";

    scale+=0.18;

    yesBtn.style.transform=
    `scale(${scale})`;

    if(attempt<messages.length-1){

        attempt++;

        noBtn.innerHTML=
        messages[attempt];
    }
}

noBtn.addEventListener(
"mouseover",
escapeNo
);

noBtn.addEventListener(
"click",
escapeNo
);

/* YES Click */

yesBtn.addEventListener(
"click",
()=>{

document.getElementById(
"questionBox"
).style.display="none";

document.getElementById(
"resultBox"
).style.display="block";

/* Heart Explosion */

for(let i=0;i<120;i++){

let heart=
document.createElement("div");

heart.className="explosion";

heart.innerHTML="❤️";

heart.style.left="50%";
heart.style.top="50%";

heart.style.setProperty(
'--x',
Math.random()
);

heart.style.setProperty(
'--y',
Math.random()
);

document.body.appendChild(
heart
);

setTimeout(()=>{
heart.remove();
},3000);

}

});
</script>

</body>
</html>
